<style>
        body {
            /* Fallback deep midnight green if classes fail, but using Tailwind */
            background-color: #0A1F1C; 
        }
        .glow-effect {
            box-shadow: 0 0 25px rgba(198, 255, 61, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-[#0A1F1C] text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile relative overflow-hidden">
<!-- Background atmospheric graphic -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% -20%, #a2d801 0%, transparent 60%);"></div>
<!-- Main Card -->
<main class="w-full max-w-md relative z-10 flex flex-col gap-lg">
<!-- Header -->
<header class="text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight italic mb-2">CREAR CUENTA</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Predice los marcadores y compite con tus amigos</p>
</header>
<!-- Form Container (Glassmorphism) -->
<div class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/20 rounded-xl p-6 sm:p-8 flex flex-col gap-6 shadow-2xl">
<!-- Optional Error Banner (Active for this demo as requested) -->
<div class="bg-error-container/20 border border-error/30 rounded-lg p-3 flex items-start gap-3">
<span class="material-symbols-outlined text-error mt-0.5" data-icon="error" data-weight="fill" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="font-body-md text-body-md text-error">El código de invitación no es válido</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-sm" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="name">Nombre completo</label>
<input class="bg-surface-container-high border border-outline-variant/30 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-colors" id="name" name="name" placeholder="Juan Pérez" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Correo</label>
<input class="bg-surface-container-high border border-outline-variant/30 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-colors" id="email" name="email" placeholder="tu@correo.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Contraseña</label>
<input class="bg-surface-container-high border border-outline-variant/30 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<p class="font-label-caps text-[10px] text-on-surface-variant/70">mínimo 6 caracteres</p>
</div>
<!-- Invitation Code (Highlighted) -->
<div class="flex flex-col gap-xs mt-2 relative">
<label class="font-label-caps text-label-caps text-primary-fixed-dim uppercase" for="invite_code">CÓDIGO DE INVITACIÓN</label>
<input class="bg-surface-container-highest border border-primary-fixed-dim rounded-lg px-4 py-3 font-label-score text-label-score text-primary-fixed tracking-widest uppercase placeholder:text-primary-fixed-dim/30 focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim/50 glow-effect transition-all" id="invite_code" name="invite_code" placeholder="EJ: WC26-PRO" type="text" value="WC26-BAD"/>
<span class="material-symbols-outlined absolute right-4 top-[38px] text-error" data-icon="cancel" data-weight="fill" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
<!-- Submit Button -->
<button class="mt-6 w-full bg-primary-fixed text-on-primary-fixed font-label-caps text-label-caps py-4 rounded-lg uppercase hover:bg-primary-fixed-dim active:scale-95 transition-all glow-effect flex items-center justify-center gap-2" type="submit">
                    CREAR CUENTA
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="text-center mt-2">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary-fixed-dim transition-colors" href="#">
                    ¿Ya tienes cuenta? <span class="text-primary-fixed-dim underline decoration-primary-fixed-dim/30 underline-offset-4">Inicia sesión</span>
</a>
</div>
</div>
</main>
<!-- Suppressed navigation shell because this is a transactional sign-up screen -->
</body></html>
