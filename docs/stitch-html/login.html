<!-- Decorative Atmosphere Particles -->
<div class="fixed inset-0 pointer-events-none z-10 opacity-30" id="particles"></div>
<script>
        // Micro-interaction: Particle Effect to simulate rain/lights
        const particlesContainer = document.getElementById('particles');
        function createParticle() {
            const particle = document.createElement('div');
            const size = Math.random() * 2 + 1;
            particle.className = 'absolute bg-primary-fixed rounded-full opacity-0';
            particle.style.width = size + 'px';
            particle.style.height = (size * (Math.random() * 5 + 5)) + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '-10vh';
            
            particlesContainer.appendChild(particle);

            const duration = Math.random() * 1000 + 1000;
            const animation = particle.animate([
                { transform: 'translateY(0) rotate(15deg)', opacity: 0 },
                { transform: 'translateY(50vh) rotate(15deg)', opacity: 0.5 },
                { transform: 'translateY(110vh) rotate(15deg)', opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            });

            animation.onfinish = () => particle.remove();
        }

        // Generate particles periodically
        setInterval(createParticle, 150);

        // Hover Effect on buttons for light refraction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--x', `${x}px`);
                btn.style.setProperty('--y', `${y}px`);
            });
        });
    </script>
